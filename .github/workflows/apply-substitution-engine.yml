name: Apply substitution engine integration

on:
  push:
    branches:
      - feat/mvp3-substitutions

permissions:
  contents: write

jobs:
  edit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/mvp3-substitutions
      - name: Integrate substitution manager
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('kbo/engine/game.py')
          s = p.read_text(encoding='utf-8')

          s = s.replace(
              'from .plate_appearance import resolve_pa\n',
              'from .plate_appearance import resolve_pa\nfrom .substitutions import SubstitutionManager\n',
              1)

          old = '''        self.defense = {"home": compute_defense(home), "away": compute_defense(away)}
          self.box = {s: {p.pid: BattingLine() for p, _ in t.lineup}
                      for s, t in (("home", home), ("away", away))}
          '''.replace('          ', '')
          new = '''        self.box = {s: {p.pid: BattingLine() for p, _ in t.lineup}
                      for s, t in (("home", home), ("away", away))}
          self.subs = SubstitutionManager(home, away, self.box)
          self.defense = {
              "home": compute_defense(home, self.subs.lineup("home")),
              "away": compute_defense(away, self.subs.lineup("away")),
          }
          '''.replace('          ', '')
          if old not in s:
              raise SystemExit('init block not found')
          s = s.replace(old, new, 1)

          s = s.replace(
              '        self.manual_change_consumed = False\n\n    # ---------- 유틸 ----------',
              '        self.manual_change_consumed = False\n\n    # ---------- 유틸 ----------',
              1)

          s = s.replace(
              '        self.manual_change_consumed = False\n\n    def state(self) -> dict:',
              '        self.manual_change_consumed = False\n        self.defense[self.fld] = compute_defense(\n            self._team(self.fld), self.subs.lineup(self.fld))\n\n    def state(self) -> dict:',
              1)

          s = s.replace(
              '            team = self._team(self.side)\n            next_batter = team.lineup[self.bo[self.side] % 9][0]',
              '            next_batter = self.subs.lineup(self.side)[self.bo[self.side] % 9][0]',
              1)

          old = '''            "available_relievers": available,
              "can_change_pitcher": bool(not self.done and self.at_decision and available),
          }
          '''.replace('          ', '')
          new = '''            "available_relievers": available,
              "can_change_pitcher": bool(not self.done and self.at_decision and available),
              "batting_substitutions": (self.subs.state(self.side, self.bases)
                                         if not self.done else None),
              "fielding_substitutions": (self.subs.state(self.fld)
                                          if not self.done else None),
          }
          '''.replace('          ', '')
          if old not in s:
              raise SystemExit('state return block not found')
          s = s.replace(old, new, 1)

          marker = '''    def step_pa(self, include_state: bool = True) -> dict:
          '''.replace('          ', '')
          methods = '''    def _emit_substitution(self, sub) -> None:
              kind_ko = {"pinch_hitter": "대타", "pinch_runner": "대주자",
                         "defensive": "대수비"}[sub.kind]
              text = (f"{self.inning}회{self.half_ko} {kind_ko}: "
                      f"{sub.out_player.name} → {sub.in_player.name}")
              if sub.base:
                  text += f" ({sub.base}루)"
              self._ev(text)
              if self.record_struct:
                  self._sev({"t": "substitution", "kind": sub.kind,
                             "inning": self.inning, "half": self.half_ko,
                             "team": self._team(sub.side).tid,
                             "order": sub.order, "slot": sub.slot,
                             "base": sub.base,
                             "out": {"pid": sub.out_player.pid,
                                     "name": sub.out_player.name},
                             "in": {"pid": sub.in_player.pid,
                                    "name": sub.in_player.name}})

          def force_pinch_hitter(self, side: str, player_pid: str) -> dict:
              self.start()
              if self.done:
                  raise ValueError("이미 종료된 경기입니다.")
              if not self.at_decision:
                  raise ValueError("대타는 다음 타석 시작 전에만 투입할 수 있습니다.")
              if side != self.side:
                  raise ValueError("현재 공격 중인 팀만 대타를 투입할 수 있습니다.")
              order_idx = self.bo[side] % 9
              sub = self.subs.pinch_hitter(side, order_idx, player_pid)
              self._emit_substitution(sub)
              return self.state()

          def force_pinch_runner(self, side: str, base: int, player_pid: str) -> dict:
              self.start()
              if self.done:
                  raise ValueError("이미 종료된 경기입니다.")
              if not self.at_decision:
                  raise ValueError("대주자는 다음 타석 시작 전에만 투입할 수 있습니다.")
              if side != self.side:
                  raise ValueError("현재 공격 중인 팀만 대주자를 투입할 수 있습니다.")
              sub = self.subs.pinch_runner(side, self.bases, base, player_pid)
              self._emit_substitution(sub)
              return self.state()

          def force_defensive_sub(self, side: str, out_pid: str, in_pid: str) -> dict:
              self.start()
              if self.done:
                  raise ValueError("이미 종료된 경기입니다.")
              if not self.at_decision:
                  raise ValueError("대수비는 다음 타석 시작 전에만 투입할 수 있습니다.")
              if side != self.fld:
                  raise ValueError("현재 수비 중인 팀만 대수비를 투입할 수 있습니다.")
              sub = self.subs.defensive(side, out_pid, in_pid)
              self.defense[side] = compute_defense(
                  self._team(side), self.subs.lineup(side))
              self._emit_substitution(sub)
              return self.state()

          '''.replace('          ', '')
          if marker not in s:
              raise SystemExit('step marker not found')
          s = s.replace(marker, methods + marker, 1)

          s = s.replace(
              '        team = self._team(self.side)\n\n        # 수동 교체가 없었던 결정점에서만 기존 AI 교체 판단을 수행한다.',
              '        # 수동 교체가 없었던 결정점에서만 기존 AI 교체 판단을 수행한다.',
              1)
          s = s.replace(
              '        batter, _slot = team.lineup[self.bo[self.side] % 9]',
              '        batter, _slot = self.subs.lineup(self.side)[self.bo[self.side] % 9]',
              1)
          s = s.replace(
              '        cands = [(p, 110 - p.bat.fielding) for p, s in self._team(fld).lineup if s in slots]',
              '        cands = [(p, 110 - p.bat.fielding)\n                 for p, s in self.subs.lineup(fld) if s in slots]',
              1)
          s = s.replace(
              '                for p, _slot in t.lineup:\n                    getattr(p, self.stat_target + "_bat").add(self.box[side][p.pid])',
              '                for p in self.subs.participant_players(side):\n                    getattr(p, self.stat_target + "_bat").add(self.box[side][p.pid])',
              1)
          s = s.replace(
              '        box_bat = {s: [(p, slot, self.box[s][p.pid]) for p, slot in self._team(s).lineup]\n                   for s in ("away", "home")}',
              '        box_bat = {s: [(p, slot, self.box[s][p.pid])\n                       for p, slot in self.subs.participant_entries(s)]\n                   for s in ("away", "home")}',
              1)

          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit engine integration
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add kbo/engine/game.py
          git commit -m 'Integrate in-game batter and defensive substitutions'
          git push origin HEAD:feat/mvp3-substitutions
