name: Build interactive draft frontend dist

on:
  push:
    branches:
      - feat/mvp3-draft-management

permissions:
  contents: write

jobs:
  build-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/mvp3-draft-management
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Build frontend
        working-directory: web/frontend
        run: |
          npm ci
          npm run build

      - name: Update README status
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          heading = '## 웹 사용자 개입 현황 (MVP-3)'
          if heading not in text:
              block = '''## 웹 사용자 개입 현황 (MVP-3)\n\n- 라인업·수비 슬롯·선발 로테이션·마무리·셋업 직접 편집\n- 실시간 경기 한 타석 진행 + 수동 투수 교체\n- 대타·대주자·대수비 직접 지시와 진행 중 경기 저장·복원\n- 오프시즌 신인 드래프트 직접 지명: AI 지명 자동 진행, 사용자 지명권에서 정지,\n  스카우팅 오차가 적용된 보드와 AI 추천 제공\n- 후속 범위: FA 직접 입찰, 트레이드 제안·수락, 2군/육성\n\n'''
              text = text.replace('## 다음 단계\n', block + '## 다음 단계\n')
          old = ('남은 3단계 확장: 2군/육성·보상선수·구단 개성(백로그). 이후 4단계: 웹 UI.')
          new = ('남은 확장: FA 직접 입찰·트레이드 직접 협상·2군/육성·보상선수·구단 개성.')
          text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit generated assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md web/frontend/dist
          if git diff --cached --quiet; then
            echo 'No generated changes.'
          else
            git commit -m 'Build interactive draft frontend dist'
            git push origin HEAD:feat/mvp3-draft-management
          fi
