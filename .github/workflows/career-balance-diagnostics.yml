name: Career balance diagnostics

on:
  push:
    branches:
      - feat/career-retirement-hall-of-fame

concurrency:
  group: career-balance-diagnostics
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  long-term-balance:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/career-retirement-hall-of-fame
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements.txt
      - name: Run final four-seed thirty-season check
        run: |
          set +e
          python scripts/career_balance_check.py --seeds 4 --seasons 30 --strict > .github/career-balance-output.txt 2>&1
          echo "exit_code=$?" >> .github/career-balance-output.txt
          exit 0
      - name: Commit diagnostics
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/career-balance-output.txt
          git commit -m 'Capture manager career balance diagnostics' || exit 0
          git push origin HEAD:feat/career-retirement-hall-of-fame
