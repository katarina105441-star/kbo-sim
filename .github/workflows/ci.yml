name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
      - "feat/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install web backend dependencies
        run: python -m pip install --upgrade pip fastapi uvicorn

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify FastAPI backend import
        run: python -c "from web.backend.main import app; assert app is not None"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
