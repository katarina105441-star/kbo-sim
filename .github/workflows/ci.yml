name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "claude/**"
      - "feat/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run focused FA tests
        id: focused
        continue-on-error: true
        run: |
          set +e
          python -m unittest tests.test_fa_session tests.test_fa_api tests.test_draft_offseason -v > fa-tests.log 2>&1
          code=$?
          cat fa-tests.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload focused test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fa-test-log
          path: fa-tests.log

      - name: Fail when focused tests fail
        if: steps.focused.outputs.exit_code != '0'
        run: exit 1

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify FastAPI backend import
        run: python -c "from web.backend.main import app; assert app is not None"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
