name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "claude/**"
      - "feat/**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify FastAPI backend import
        run: python -c "from web.backend.main import app; assert app is not None"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  onboarding-release-finalize:
    if: github.ref == 'refs/heads/feat/onboarding-release-polish' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: feat/onboarding-release-polish
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run release check and frontend build
        run: python scripts/release_check.py --frontend

      - name: Commit generated assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add web/frontend/dist
          if git diff --cached --quiet; then
            echo 'No generated changes.'
          else
            git commit -m 'Update onboarding frontend assets'
            git push origin HEAD:feat/onboarding-release-polish
          fi
