name: FA diagnostics

on:
  push:
    branches:
      - feat/mvp3-fa-management

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements.txt
      - name: Run focused FA tests
        run: python -m unittest tests.test_fa_session tests.test_fa_api tests.test_draft_offseason -v
