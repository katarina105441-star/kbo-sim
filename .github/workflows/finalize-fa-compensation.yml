name: Finalize FA compensation

on:
  push:
    branches:
      - feat/fa-compensation-players

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/fa-compensation-players
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - name: Update documentation
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '- 오프시즌 FA 직접 입찰: 선수별 AAV 제안·패스·AI 판단, 예산·보상금·영입 한도 반영\n',
              '- 오프시즌 FA 직접 입찰: 선수별 AAV 제안·패스·AI 판단, 예산·영입 한도 반영\n'
              '- FA 보상선수: A 20명·B 25명 보호명단, 비보호선수 지명 또는 등급별 현금 선택\n')
          text = text.replace(
              '- 후속 범위: FA 보상선수, 구단별 운영 성향',
              '- 후속 범위: 구단별 감독·스카우팅·운영 성향')
          text = text.replace(
              '오프시즌 풀 체인: 에이징(은퇴) → 트레이드 → FA → 드래프트(지명권 반영) → 재정.',
              '오프시즌 풀 체인: 에이징(은퇴) → 트레이드 → FA → FA 보상 → 드래프트(지명권 반영) → 재정.')
          text = text.replace(
              '남은 확장: 보상선수·구단 개성.',
              '남은 확장: 구단별 감독·스카우팅·운영 성향.')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Build frontend dist
        working-directory: web/frontend
        run: |
          npm ci
          npm run build
      - name: Commit generated assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md web/frontend/dist
          if git diff --cached --quiet; then
            echo 'No generated changes.'
          else
            git commit -m 'Update FA compensation docs and frontend assets'
            git push origin HEAD:feat/fa-compensation-players
          fi
