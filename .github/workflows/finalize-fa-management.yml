name: Finalize FA management assets

on:
  push:
    branches:
      - feat/mvp3-fa-management

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/mvp3-fa-management
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Apply final FA rule and documentation updates
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('kbo/league/fa_session.py')
          text = path.read_text(encoding='utf-8')
          old = '''        if self.signed_count[self.user_tid] >= self.limit:\n            return 0.0\n'''
          new = '''        if (self.user_tid != pending.home_tid\n                and self.signed_count[self.user_tid] >= self.limit):\n            return 0.0\n'''
          if old not in text:
              raise SystemExit('FA home-offer target not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          readme = Path('README.md')
          doc = readme.read_text(encoding='utf-8')
          doc = doc.replace(
              '- 오프시즌 신인 드래프트 직접 지명: AI 지명 자동 진행, 사용자 지명권에서 정지,\n  스카우팅 오차가 적용된 보드와 AI 추천 제공\n- 후속 범위: FA 직접 입찰, 트레이드 제안·수락, 2군/육성',
              '- 오프시즌 FA 직접 입찰: 선수별 AAV 제안·패스·AI 판단, 예산·보상금·영입 한도 반영\n- 오프시즌 신인 드래프트 직접 지명: AI 지명 자동 진행, 사용자 지명권에서 정지,\n  스카우팅 오차가 적용된 보드와 AI 추천 제공\n- 후속 범위: 트레이드 제안·수락, 2군/육성')
          doc = doc.replace(
              '남은 확장: FA 직접 입찰·트레이드 직접 협상·2군/육성·보상선수·구단 개성.',
              '남은 확장: 트레이드 직접 협상·2군/육성·보상선수·구단 개성.')
          readme.write_text(doc, encoding='utf-8')
          PY

      - name: Build frontend dist
        working-directory: web/frontend
        run: |
          npm ci
          npm run build

      - name: Commit finalized files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add kbo/league/fa_session.py README.md web/frontend/dist
          if git diff --cached --quiet; then
            echo 'No finalization changes.'
          else
            git commit -m 'Finalize FA management rules and assets'
            git push origin HEAD:feat/mvp3-fa-management
          fi
