name: Finalize manager career

on:
  push:
    branches:
      - feat/manager-career-media

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/manager-career-media
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - name: Update documentation
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '- 구단주 이벤트·목표 보상·업적: 시즌 중 선택, 예산·신뢰도 변화, 8종 감독 업적\n'
              '- 후속 범위: 장기 밸런스 검증과 실제 해임·이적 등 감독 커리어 확장',
              '- 구단주 이벤트·목표 보상·업적: 시즌 중 선택, 예산·신뢰도 변화, 8종 감독 업적\n'
              '- 감독 커리어: 실제 해임, 재취업 제안, 구단 이동, 팬 지지율·언론 압박\n'
              '- 후속 범위: 장기 밸런스 검증과 명예의 전당·은퇴 등 커리어 결산')
          text = text.replace(
              '4단계 진행 동기 완료: 시즌 목표·구단주 신뢰도·프런트 평가·해임 위험·감독 성과 기록·구단주 이벤트·목표 보상·업적 ✔\n'
              '남은 확장: 장기 밸런스 검증·실제 해임/재취업·구단 이동·미디어 및 팬 반응 시스템.',
              '4단계 감독 커리어 완료: 시즌 목표·프런트 평가·구단주 이벤트·업적·실제 해임·재취업·구단 이동·팬/미디어 반응 ✔\n'
              '남은 확장: 장기 밸런스 검증·명예의 전당·감독 은퇴·커리어 최종 결산.')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Build frontend dist
        working-directory: web/frontend
        run: |
          npm ci
          npm run build
      - name: Commit generated assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md web/frontend/dist
          if git diff --cached --quiet; then
            echo 'No generated changes.'
          else
            git commit -m 'Update manager career docs and frontend assets'
            git push origin HEAD:feat/manager-career-media
          fi
