name: Finalize minors development

on:
  push:
    branches:
      - feat/mvp3-minors-development

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/mvp3-minors-development
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Apply final development fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('kbo/league/development.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'from .aging import BAT_W, PIT_W, ensure_talents, make_rookie, overall',
              'from .aging import (BAT_W, PIT_W, age_player, ensure_talents, make_rookie,\n                    overall, should_retire)')
          start = text.index('def development_tick(')
          end = text.index('\ndef _make_room_for_callup', start)
          function = '''def development_tick(rng: random.Random, teams: list[Team]) -> DevelopmentReport:\n    """완료된 시즌의 2군 등록일을 성장 보너스로 환산한 뒤 에이징한다."""\n    report = DevelopmentReport()\n    all_players = [p for team in teams for p in team.roster + team.minors]\n    ensure_talents(rng, all_players)\n    a = TUNE["aging"]\n    for team in teams:\n        survivors = []\n        for player in list(team.minors):\n            ensure_player_fields(player)\n            before = overall(player)\n            if player.minor_days >= 30:\n                season_frac = min(1.0, player.minor_days / 144.0)\n                age_mult = 1.0 if player.age <= 23 else (0.75 if player.age <= 26 else 0.35)\n                talent_mult = 0.65 + 0.55 * player.tal_g\n                base = season_frac * age_mult * talent_mult\n                ratings = player.pit if player.is_pitcher else player.bat\n                names = PIT_W if player.is_pitcher else BAT_W\n                for name in names:\n                    delta = base * _focus_multiplier(player, name) + rng.gauss(0.0, 0.08)\n                    delta = clamp(delta, 0.0, 2.2)\n                    setattr(ratings, name,\n                            clamp(getattr(ratings, name) + delta,\n                                  a["rating_min"], a["rating_max"]))\n            after_training = overall(player)\n            player.dev_last_gain = round(max(0.0, after_training - before), 2)\n            if player.dev_last_gain > 0:\n                report.gains.append((team, player, player.dev_last_gain))\n            if player.minor_days >= 100:\n                player.minor_seasons += 1\n            player.minor_days = 0\n            age_player(rng, player)\n            if should_retire(rng, player):\n                report.retired.append((team, player))\n            else:\n                survivors.append(player)\n        team.minors = survivors\n    precompute_all(p for team in teams for p in team.roster + team.minors)\n    report.gains.sort(key=lambda row: row[2], reverse=True)\n    return report\n\n'''
          path.write_text(text[:start] + function + text[end + 1:], encoding='utf-8')

          path = Path('web/backend/development_management.py')
          text = path.read_text(encoding='utf-8')
          old = '''        "items": [\n            f"{team.tid} {player.name}({player.age}세 {player.pos}) "\n            f"OVR +{gain:.2f} · {player.development_focus}"\n            for team, player, gain in report.gains[:20]\n        ] or ["이번 시즌 육성 보너스 대상 없음"],'''
          new = '''        "items": ([\n            f"{team.tid} {player.name}({player.age}세 {player.pos}) "\n            f"OVR +{gain:.2f} · {player.development_focus}"\n            for team, player, gain in report.gains[:20]\n        ] + [\n            f"{team.tid} {player.name}({player.age}세) 2군 은퇴"\n            for team, player in report.retired\n        ]) or ["이번 시즌 육성 보너스 대상 없음"],'''
          if old not in text:
              raise SystemExit('development report anchor not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          path = Path('web/backend/main.py')
          text = path.read_text(encoding='utf-8')
          old = '''    for t in sess().teams:\n        for p in t.roster:\n            if p.pid == pid:\n                return ser.player_detail(p)'''
          new = '''    for t in sess().teams:\n        for p in t.roster + getattr(t, "minors", []):\n            if p.pid == pid:\n                return ser.player_detail(p)'''
          if old not in text:
              raise SystemExit('player detail anchor not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '- 오프시즌 트레이드 직접 협상: 선수·지명권 패키지 제안, AI 수락·역제안·거절\n',
              '- 1군·2군 이동과 유망주 육성: 등록일·연령·숨김 재능·육성 방향 기반 성장\n- 부상으로 건강한 야수 9명·투수 6명이 부족할 때 2군 자동 콜업\n- 오프시즌 트레이드 직접 협상: 선수·지명권 패키지 제안, AI 수락·역제안·거절\n')
          text = text.replace(
              '- 후속 범위: 2군/육성, 보상선수, 구단별 운영 성향',
              '- 후속 범위: FA 보상선수, 구단별 운영 성향')
          text = text.replace(
              '남은 확장: 2군/육성·보상선수·구단 개성.',
              '남은 확장: 보상선수·구단 개성.')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Build frontend dist
        working-directory: web/frontend
        run: |
          npm ci
          npm run build

      - name: Commit finalized files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add kbo/league/development.py web/backend/development_management.py web/backend/main.py README.md web/frontend/dist
          if git diff --cached --quiet; then
            echo 'No finalization changes.'
          else
            git commit -m 'Finalize minor league development flow and assets'
            git push origin HEAD:feat/mvp3-minors-development
          fi
