name: Finalize onboarding release

on:
  push:
    branches:
      - feat/onboarding-release-packaging

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/onboarding-release-packaging
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Update release documentation
        run: python scripts/update_release_docs.py

      - name: Synchronize frontend lockfile
        working-directory: web/frontend
        run: npm install --package-lock-only --ignore-scripts

      - name: Build frontend dist
        working-directory: web/frontend
        run: |
          npm ci
          npm run build

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Build release archives
        run: python scripts/build_release.py --output release

      - name: Verify release ZIP
        run: python -c "import zipfile; from pathlib import Path; a=next(Path('release').glob('*.zip')); n=set(zipfile.ZipFile(a).namelist()); r=a.stem+'/'; required={r+'게임 시작.bat',r+'run_game.py',r+'QUICKSTART.md',r+'web/frontend/dist/index.html'}; missing=required-n; assert not missing, sorted(missing); print(a.name,a.stat().st_size)"

      - name: Commit generated release files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md web/frontend/package-lock.json web/frontend/dist
          if git diff --cached --quiet; then
            echo 'No generated changes.'
          else
            git commit -m 'Update onboarding docs and release frontend assets'
            git push origin HEAD:feat/onboarding-release-packaging
          fi
