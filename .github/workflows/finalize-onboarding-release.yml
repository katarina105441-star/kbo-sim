name: Finalize onboarding release

on:
  push:
    branches:
      - feat/onboarding-release-polish

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/onboarding-release-polish
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Run release check with frontend build
        run: python scripts/release_check.py --frontend
      - name: Commit generated frontend assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add web/frontend/dist
          if git diff --cached --quiet; then
            echo 'No generated changes.'
          else
            git commit -m 'Update onboarding frontend assets'
            git push origin HEAD:feat/onboarding-release-polish
          fi
