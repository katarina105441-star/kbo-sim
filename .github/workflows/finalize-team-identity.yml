name: Finalize team identity

on:
  push:
    branches:
      - feat/team-identity-tendencies

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/team-identity-tendencies
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - name: Update documentation
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          old = '''### 백로그 (나중에 '구단 개성' 살릴 때)
          - **감독/구단 스카우팅 성향 편향**: 구단마다 파워/컨택/주루 등 능력치 선호가
            달라 드래프트·FA에서 편향된 선택을 하게. (실제: 김경문 감독이 발 빠른 야수를
            선호해 스카우트팀에 의사 전달한 사례.) 현재 드래프트는 라운드별 BPA/Need만
            차등 — 구단별 선호 편향은 미구현. 트레이드/구단운영 확장 시 추가.
          '''
          new = '''### 구단 개성 구현됨
          - **감독·스카우팅·운영 성향**: 10개 구단에 윈나우/균형/리빌딩 기조와
            타격·투수 선호, 스카우팅 정확도, 위험 선호, FA·트레이드 적극성, 육성 비중을
            부여했다. 드래프트 보드·FA 오퍼·트레이드 자산평가·보상선수 보호명단에 실제 반영된다.
          '''
          text = text.replace(old, new)
          text = text.replace(
              '- 오프시즌 신인 드래프트 직접 지명: AI 지명 자동 진행, 사용자 지명권에서 정지,\n'
              '  스카우팅 오차가 적용된 보드와 AI 추천 제공\n'
              '- 후속 범위: 구단별 감독·스카우팅·운영 성향',
              '- 오프시즌 신인 드래프트 직접 지명: AI 지명 자동 진행, 사용자 지명권에서 정지,\n'
              '  스카우팅 오차가 적용된 보드와 AI 추천 제공\n'
              '- 구단별 감독·스카우팅·운영 성향: 팀마다 다른 드래프트·FA·트레이드 판단\n'
              '- 후속 범위: 장기 밸런스 검증과 게임 진행 동기 강화')
          text = text.replace(
              '**3단계 (구단 운영) 핵심 4블록 완료**: 연봉/계약 ✔ → 드래프트 ✔ → FA ✔ → 트레이드 ✔',
              '**3단계 (구단 운영) 완료**: 연봉/계약 ✔ → 드래프트 ✔ → FA·보상선수 ✔ → 트레이드 ✔ → 2군 육성 ✔ → 구단 성향 ✔')
          text = text.replace(
              '남은 확장: 구단별 감독·스카우팅·운영 성향.',
              '남은 확장: 장기 밸런스 검증·시즌 목표·프런트 평가 등 게임 진행 동기 강화.')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Build frontend dist
        working-directory: web/frontend
        run: |
          npm ci
          npm run build
      - name: Commit generated assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md web/frontend/dist
          if git diff --cached --quiet; then
            echo 'No generated changes.'
          else
            git commit -m 'Update team identity docs and frontend assets'
            git push origin HEAD:feat/team-identity-tendencies
          fi
