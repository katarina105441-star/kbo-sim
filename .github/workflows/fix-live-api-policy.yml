name: Fix live API state policy

on:
  push:
    branches:
      - feat/mvp3-live-management

permissions:
  contents: write

jobs:
  edit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/mvp3-live-management
      - name: Apply API state guards
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('web/backend/main.py')
          s = p.read_text(encoding='utf-8')
          old = '''@app.put("/api/my/lineup")
          def my_lineup_update(req: LineupUpdate):
              """라인업 전체를 원자적으로 저장. ``use_ai``면 AI 추천으로 초기화."""
              team = sess().user_team
              try:
          '''.replace('          ', '')
          new = '''@app.put("/api/my/lineup")
          def my_lineup_update(req: LineupUpdate):
              """라인업 전체를 원자적으로 저장. ``use_ai``면 AI 추천으로 초기화."""
              s = sess()
              if s.live_sim is not None and not s.live_sim.done:
                  raise HTTPException(409, "실시간 경기 중에는 라인업을 변경할 수 없습니다.")
              team = s.user_team
              try:
          '''.replace('          ', '')
          if old not in s:
              raise SystemExit('lineup target not found')
          s = s.replace(old, new, 1)

          old = '''@app.post("/api/live/pitcher")
          def live_pitcher(req: LivePitcherChange):
              s = sess()
              try:
                  s.live_change_pitcher(req.pid)
              except LookupError as exc:
                  raise HTTPException(404, str(exc)) from exc
              except RuntimeError as exc:
                  raise HTTPException(409, str(exc)) from exc
              except ValueError as exc:
                  raise HTTPException(422, str(exc)) from exc
              return _live_payload(s)
          '''.replace('          ', '')
          new = '''@app.post("/api/live/pitcher")
          def live_pitcher(req: LivePitcherChange):
              s = sess()
              try:
                  sim = s.require_live()
              except LookupError as exc:
                  raise HTTPException(404, str(exc)) from exc
              user_side = "home" if sim.home.tid == s.user_tid else "away"
              if sim.done or not sim.at_decision or sim.fld != user_side:
                  raise HTTPException(409, "현재 시점에는 투수를 교체할 수 없습니다.")
              try:
                  s.live_change_pitcher(req.pid)
              except RuntimeError as exc:
                  raise HTTPException(409, str(exc)) from exc
              except ValueError as exc:
                  raise HTTPException(422, str(exc)) from exc
              return _live_payload(s)
          '''.replace('          ', '')
          if old not in s:
              raise SystemExit('pitcher target not found')
          s = s.replace(old, new, 1)
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit guards
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add web/backend/main.py
          git commit -m 'Enforce live game API state guards'
          git push origin HEAD:feat/mvp3-live-management
