name: Minors diagnostics

on:
  push:
    branches:
      - feat/mvp3-minors-development

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements.txt
      - name: Run focused development tests
        run: python -m unittest tests.test_development tests.test_development_api -v
