name: Team identity diagnostics

on:
  push:
    branches:
      - feat/team-identity-tendencies

permissions:
  contents: write

jobs:
  focused-tests:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/team-identity-tendencies
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements.txt
      - name: Capture full regression failures
        run: |
          python - <<'PY'
          import sys
          import unittest
          from pathlib import Path

          suite = unittest.defaultTestLoader.discover('tests')
          result = unittest.TestResult()
          suite.run(result)
          lines = [
              f'Ran {result.testsRun} tests',
              f'Failures: {len(result.failures)}',
              f'Errors: {len(result.errors)}',
          ]
          for test, traceback in result.failures:
              lines.extend(['', f'FAIL: {test}', traceback])
          for test, traceback in result.errors:
              lines.extend(['', f'ERROR: {test}', traceback])
          lines.append(f'exit_code={0 if result.wasSuccessful() else 1}')
          Path('.github/team-identity-test-output.txt').write_text(
              '\n'.join(lines), encoding='utf-8')
          sys.exit(0)
          PY
      - name: Commit diagnostics
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/team-identity-test-output.txt
          git commit -m 'Capture full regression diagnostics' || exit 0
          git push origin HEAD:feat/team-identity-tendencies
