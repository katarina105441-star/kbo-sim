name: Team identity diagnostics

on:
  push:
    branches:
      - feat/team-identity-tendencies

permissions:
  contents: write

jobs:
  focused-tests:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/team-identity-tendencies
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements.txt
      - name: Capture team identity test output
        run: |
          set +e
          python -m unittest tests.test_team_identity tests.test_team_identity_api -v > .github/team-identity-test-output.txt 2>&1
          echo "exit_code=$?" >> .github/team-identity-test-output.txt
          exit 0
      - name: Commit diagnostics
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/team-identity-test-output.txt
          git commit -m 'Capture team identity diagnostics' || exit 0
          git push origin HEAD:feat/team-identity-tendencies
